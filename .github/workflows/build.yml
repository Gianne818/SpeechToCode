name: Build Windows Exe

on:
  push:
    branches:
      - main 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter google-genai pyinstaller

    - name: Build Single EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --collect-all customtkinter --collect-all google-genai --name "AI-Formatter" main.py

    - name: Upload Finished Executable
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Executable
        path: dist/AI-Formatter.exe